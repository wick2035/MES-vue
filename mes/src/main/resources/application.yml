server:
  session-timeout: 1800
spring:
  profiles:
    active: dev
  mvc:
    async:
      # SSE 流式对话两轮调用（工具规划 + 流式作答）耗时可能超过默认 30s，
      # 放宽异步请求超时，避免 emitter 提前 complete 导致 delta 发送失败
      request-timeout: 300000
  cache:
    type: ehcache
    ehcache:
      config: classpath:ehcache.xml
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mes:
  schema:
    init-menus: false
  file:
    upload-path: D:/mes/upload
    access-prefix: /upload

# 大模型（通义千问 DashScope，OpenAI 兼容接口）配置
# api-key 通过环境变量 DASHSCOPE_API_KEY 注入，切勿硬编码进仓库
llm:
  provider: dashscope
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: sk-94d930e22f834b968587ea6687fbbeb2
  model: qwen3.6-plus
  timeout: 600000

swagger:
  controller: com.wangziyang.mes
  description: MES接口管理
  enable: true
  license: wangziyang
  licenseUrl: https://gitee.com/wangziyangyang/MES-Sprongboot
  title: 王子杨的API 管理
  version: 1.0.0

logging:
  config: classpath:logback.xml
